<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Aplikasi persiapan ujian Kalkulus 2 — rencana belajar, ringkasan materi, bank soal 60+, 3 mock exam, AI tutor, kartu kilat, dan tolak ukur. Multi-profil dengan cloud sync.">
  <title>Persiapan Kalkulus 2 — Ace the Exam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$','$$'],['\\[','\\]']] },
      svg: { fontCache: 'global' },
      startup: { typeset: false }
    };
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js" async></script>
</head>
<body>
  <header>
    <div class="htop">
      <h1><span class="logo-icon">∞</span> Persiapan <span>Kalkulus 2</span></h1>
      <div class="hright">
        <select id="profSel" class="profsel" title="Ganti profil"></select>
        <div class="countdown">Ujian dalam <b id="cd">—</b></div>
      </div>
    </div>
    <nav id="nav">
      <button data-t="dash" class="active">Dashboard</button>
      <button data-t="jadwal">Jadwal</button>
      <button data-t="prasyarat">Prasyarat</button>
      <button data-t="materi">Materi</button>
      <button data-t="rumus">Rumus</button>
      <button data-t="latihan">Latihan</button>
      <button data-t="solver">Solver</button>
      <button data-t="flashcards">Kartu Kilat</button>
      <button data-t="drills">Drill Cepat</button>
      <button data-t="mock">Mock Exam</button>
      <button data-t="tolakukur">Tolak Ukur</button>
      <button data-t="pengaturan">Pengaturan</button>
    </nav>
  </header>

  <main>
    <section id="dash" class="active"></section>
    <section id="jadwal"></section>
    <section id="prasyarat"></section>
    <section id="materi"></section>
    <section id="rumus"></section>
    <section id="latihan"></section>
    <section id="solver"></section>
    <section id="flashcards"></section>
    <section id="drills"></section>
    <section id="mock"></section>
    <section id="tolakukur"></section>
    <section id="pengaturan"></section>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
